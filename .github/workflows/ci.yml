name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  windows-mingw:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v5
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-openssl
            make
            python
      - name: Build
        run: make
      - name: C unit tests
        run: make unit-test
      - name: HTTP integration tests
        run: make integration-test
      - name: Generate localhost TLS certificate
        env:
          MSYS2_ARG_CONV_EXCL: "*"
        run: >-
          openssl req -x509 -newkey rsa:2048 -nodes -days 1
          -subj "/CN=localhost"
          -addext "subjectAltName=DNS:localhost"
          -keyout tests/tls-key.pem
          -out tests/tls-cert.pem
      - name: Trust localhost TLS certificate
        shell: pwsh
        run: |
          $certPath = (Resolve-Path tests/tls-cert.pem).Path
          $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($certPath)
          $cert.Thumbprint | Set-Content tests/tls-thumbprint.txt
          $store = [System.Security.Cryptography.X509Certificates.X509Store]::new(
            "Root", [System.Security.Cryptography.X509Certificates.StoreLocation]::CurrentUser)
          $store.Open([System.Security.Cryptography.X509Certificates.OpenFlags]::ReadWrite)
          $store.Add($cert)
          $store.Close()
      - name: HTTPS SChannel integration tests
        run: make https-test
      - name: Remove localhost TLS certificate
        if: always()
        shell: pwsh
        run: |
          if (Test-Path tests/tls-thumbprint.txt) {
            $thumbprint = (Get-Content tests/tls-thumbprint.txt).Trim()
            $store = [System.Security.Cryptography.X509Certificates.X509Store]::new(
              "Root", [System.Security.Cryptography.X509Certificates.StoreLocation]::CurrentUser)
            $store.Open([System.Security.Cryptography.X509Certificates.OpenFlags]::ReadWrite)
            $matches = $store.Certificates.Find(
              [System.Security.Cryptography.X509Certificates.X509FindType]::FindByThumbprint,
              $thumbprint, $false)
            foreach ($cert in $matches) { $store.Remove($cert) }
            $store.Close()
          }
      - name: Upload tested executable
        uses: actions/upload-artifact@v7
        with:
          name: mudl-windows-x64
          path: mudl.exe
          if-no-files-found: error
